          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
      security:
      - ApiKey: []
      - oAuth2:
        - payrisk.write
      summary: Synchronous fraud decision for a purchase
      tags:
      - payrisk
      x-content-type: application/json
      x-accepts:
