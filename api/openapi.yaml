openapi: 3.0.4
info:
  contact:
    email: support@alogram.ai
    name: Alogram Support
    url: https://alogram.ai/#contact
  description: |
    API for detecting and scoring fraud for purchases, with lifecycle labeling and behavioral signals. v1 focuses on purchases only (`/risk/check`), with future account/session and KYC checks stubbed below.
  license:
    name: LicenseRef-Alogram
    url: https://alogram.ai/#tos
  termsOfService: https://alogram.ai/#tos
  title: Payments Risk API
  version: 0.1.6
servers:
- description: Per-environment API gateway.
  url: "https://api-{environment}.alogram.ai/{version}"
  variables:
    environment:
      default: dev
      enum:
      - dev
      - nonprod
      - sandbox
    version:
      default: v1
      enum:
      - v1
  x-google-endpoint: {}
- description: Production API gateway v1.
  url: https://api.alogram.ai/v1
security:
- ApiKey: []
- oAuth2:
  - payrisk.write
paths:
  /v1/risk/check:
    post:
      operationId: riskCheck
      parameters:
      - description: Echoed or generated trace ID for tracking requests.
        explode: false
        in: header
        name: x-trace-id
        required: false
        schema:
          $ref: "#/components/schemas/TraceId"
        style: simple
      - description: Unique Idempotency-Key sent in the POST request etc.
        in: header
        name: x-idempotency-key
        required: true
        schema:
          $ref: "#/components/schemas/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResponse"
          description: Synchronous risk decision.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: An error response.
          headers:
            x-trace-id:
              $ref: "#/components/headers/TraceIdHeader"
            x-idempotency-key:
              $ref: "#/components/headers/XIdempotencyKeyHeader"
        "500":
          content:
            application/problem+json:
              schema:
