          type: array
        entities:
          $ref: "#/components/schemas/EntityIds"
        amount:
          description: |
            Value of the purchase in the specified currency. Must be a positive number with up to two decimal places.
          example: 23.0
          format: float
          maximum: 10000000
          minimum: 0.01
          type: number
        currency:
          description: "ISO 4217 currency code (e.g., 'USD')."
          example: USD
          maxLength: 3
          minLength: 3
          pattern: "^[A-Z]{3}$"
          type: string
      required:
      - assessmentId
      - decision
      - decisionAt
      - riskScore
      type: object
